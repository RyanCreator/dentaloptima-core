<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="gc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1920" height="900" fill="url(#gc)"/>
  <rect width="1920" height="900" fill="url(#dots)"/>
  <text x="960" y="470" text-anchor="middle" font-size="360">🦷</text>
  <text x="960" y="860" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.8" letter-spacing="2">CHECK-UP</text>
</svg>